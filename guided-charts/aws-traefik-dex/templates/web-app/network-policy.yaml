{{- if .Values.webApp.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  podSelector:
    matchLabels:
      app: web-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from Traefik
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
    ports:
    - protocol: TCP
      port: 8090
  egress:
  # Allow DNS resolution (to kube-dns in kube-system)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow access to Kubernetes API server (typically on port 443 or 6443)
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
{{- end }}