{{- if .Values.webApp.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  entryPoints:
    - websecure
  routes:
    # All routes require authentication via OAuth2 Proxy middleware
    # OAuth2 Proxy will redirect unauthenticated users to Dex
    # After authentication, users are redirected back with cookies set
    # Priority 5 ensures this catch-all is matched after more specific routes
    - match: Host(`{{ .Values.domain }}`) && PathPrefix(`/`)
      priority: 5
      kind: Rule
      middlewares:
        - name: oauth-auth-redirect
          namespace: {{ .Values.namespace }}
      services:
        - name: web-app
          port: 8090
          namespace: {{ .Values.namespace }}
  tls: {}
{{- end }}