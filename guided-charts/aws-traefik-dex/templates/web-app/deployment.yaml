{{- if .Values.webApp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  replicas: {{ .Values.webApp.replicas }}
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
        component: web-app
    spec:
      serviceAccountName: web-app
      containers:
      - name: web-app
        image: "{{ .Values.webApp.image.repository }}:{{ .Values.webApp.image.tag }}"
        imagePullPolicy: {{ .Values.webApp.image.pullPolicy }}
        ports:
        - containerPort: 8090
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8090"
        - name: NAMESPACE
          value: {{ .Values.webApp.namespace | quote }}
        - name: STATIC_DIR
          value: "./dist"
        resources:
          {{- toYaml .Values.webApp.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
{{- end }}