{{- if .Values.webApp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: {{ .Values.namespace }}
  labels:
    app: web-app
    component: web-app
spec:
  type: ClusterIP
  ports:
  - port: 8090
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: web-app
{{- end }}