# Data Science Template - Full-featured workspace for data analysis
apiVersion: workspace.jupyter.org/v1alpha1
kind: WorkspaceTemplate
metadata:
  name: data-science
  namespace: default
  labels:
    app.kubernetes.io/name: jupyter-k8s
    app.kubernetes.io/component: template
spec:
  displayName: "Data Science"
  description: "Full-featured Jupyter environment with pandas, numpy, matplotlib, and more"
  defaultImage: "uv"
  allowedImages:
    - "uv"
    - "public.ecr.aws/sagemaker/sagemaker-distribution:3.2.0-cpu"
  allowCustomImages: false
  defaultResources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  resourceBounds:
    resources:
      cpu:
        min: "500m"
        max: "4"
      memory:
        min: "2Gi"
        max: "16Gi"
  primaryStorage:
    defaultSize: "20Gi"
    minSize: "10Gi"
    maxSize: "100Gi"
    defaultMountPath: "/home/jovyan"
    defaultStorageClassName: "ebs-sc"
  allowSecondaryStorages: true
  defaultIdleShutdown:
    enabled: true
    idleTimeoutInMinutes: 60
    detection:
      httpGet:
        path: "/api/idle"
        port: 8888
  idleShutdownOverrides:
    allow: true
    minIdleTimeoutInMinutes: 30
    maxIdleTimeoutInMinutes: 480
  defaultOwnershipType: "Public"
  defaultAccessType: "Public"
  appType: "jupyter"
  defaultPodSecurityContext:
    fsGroup: 1000
